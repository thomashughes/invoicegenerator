<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Creator — TAGart</title>
  <link rel="stylesheet" href="../branding/theme.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    @media (pointer: coarse) {
      body { background-attachment: scroll !important; }
    }

    .main-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .page-title {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .app-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      min-height: calc(100vh - 250px);
    }

    @media (max-width: 1024px) {
      .app-grid {
        grid-template-columns: 1fr;
      }
    }

    .form-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: calc(100vh - 250px);
      overflow-y: auto;
    }

    .preview-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid var(--glass-border-subtle);
      border-radius: 16px;
      padding: 20px;
    }

    .section h3 {
      margin-bottom: 16px;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--glass-border-subtle);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.3s ease;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
    }

    select {
      cursor: pointer;
    }

    textarea {
      resize: vertical;
      min-height: 70px;
    }

    .logo-upload {
      text-align: center;
      padding: 24px;
      border: 2px dashed var(--glass-border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.03);
    }

    .logo-upload:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent-primary);
    }

    .logo-preview {
      max-width: 150px;
      max-height: 80px;
      margin: 10px auto;
      display: block;
    }

    .line-items {
      margin-top: 12px;
    }

    .line-item {
      display: grid;
      grid-template-columns: 2fr 70px 90px 70px 70px 40px;
      gap: 8px;
      align-items: end;
      margin-bottom: 10px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      border: 1px solid var(--glass-border-subtle);
    }

    @media (max-width: 768px) {
      .line-item {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .line-item .form-group:first-child {
        grid-column: 1 / -1;
      }
    }

    .line-item .form-group {
      margin-bottom: 0;
    }

    .line-item .form-group label {
      font-size: 11px;
      margin-bottom: 4px;
    }

    .line-item input {
      padding: 8px 10px;
      font-size: 13px;
    }

    .preview-invoice {
      flex: 1;
      background: white;
      padding: 32px;
      border-radius: 12px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.5;
      color: #222;
      min-height: 500px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .invoice-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
      gap: 20px;
    }

    .company-info {
      flex: 1;
    }

    .invoice-title {
      font-size: 28px;
      font-weight: bold;
      color: #333;
      text-align: right;
    }

    .invoice-meta {
      text-align: right;
      margin-top: 16px;
      font-size: 13px;
    }

    .billing-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      margin-bottom: 32px;
    }

    @media (max-width: 600px) {
      .billing-section {
        grid-template-columns: 1fr;
        gap: 20px;
      }
    }

    .items-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
    }

    .items-table th,
    .items-table td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #ddd;
      font-size: 12px;
    }

    .items-table th {
      background: #f8f9fa;
      font-weight: 600;
    }

    .totals-section {
      margin-left: auto;
      width: 260px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
    }

    .total-row.grand-total {
      font-weight: bold;
      font-size: 16px;
      border-top: 2px solid #333;
      padding-top: 10px;
      margin-top: 8px;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-draft { background: #f0f0f0; color: #666; }
    .status-sent { background: #cce7ff; color: #0066cc; }
    .status-paid { background: #d4edda; color: #28a745; }
    .status-overdue { background: #f8d7da; color: #dc3545; }

    .client-dropdown {
      position: relative;
    }

    .client-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(30, 30, 50, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      max-height: 180px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
    }

    .client-item {
      padding: 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--glass-border-subtle);
      color: var(--text-primary);
      transition: background 0.2s;
    }

    .client-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .download-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .saved-invoice-item {
      padding: 14px;
      margin-bottom: 10px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border-subtle);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .saved-invoice-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--glass-border);
    }

    .invoice-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .invoice-item-details {
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
<div class="brand-shell">
  <header class="brand-header">
    <h1 class="brand-title">
      <a href="../">
        <img src="../branding/logo.png" alt="TAGart logo">
      </a>
    </h1>
  </header>

  <main class="brand-content">
    <div class="main-container">
      <div class="page-title">
        <h1>Invoice Creator</h1>
        <p class="hint">Professional invoices with live preview</p>
      </div>

      <div class="app-grid">
        <!-- Form Panel -->
        <div class="form-panel">
          <!-- Logo Upload -->
          <div class="section">
            <h3>📷 Company Logo</h3>
            <div class="logo-upload" onclick="document.getElementById('logoInput').click()">
              <input type="file" id="logoInput" accept="image/*" style="display: none;">
              <div id="logoPreview">
                <p>Click to upload logo</p>
              </div>
            </div>
          </div>

          <!-- Company Information -->
          <div class="section">
            <h3>🏢 Your Company</h3>
            <div class="form-group">
              <label>Company Name</label>
              <input type="text" id="companyName" placeholder="Your Company Name">
            </div>
            <div class="form-group">
              <label>Address</label>
              <textarea id="companyAddress" rows="2" placeholder="Your company address"></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="companyEmail" placeholder="email@company.com">
              </div>
              <div class="form-group">
                <label>Phone</label>
                <input type="text" id="companyPhone" placeholder="Phone number">
              </div>
            </div>
            <div class="form-group">
              <label>Bank Details</label>
              <textarea id="bankDetails" rows="2" placeholder="Sort code, account number etc."></textarea>
            </div>
            <button class="btn btn-primary" onclick="saveProfile()">💾 Save Profile</button>
          </div>

          <!-- Client Information -->
          <div class="section">
            <h3>👤 Client</h3>
            <div class="client-dropdown">
              <div class="form-group">
                <label>Search Client</label>
                <input type="text" id="clientSearch" placeholder="Search or add new client" oninput="searchClients()">
                <div class="client-list" id="clientList"></div>
              </div>
            </div>
            <div class="form-group">
              <label>Client Name</label>
              <input type="text" id="clientName" placeholder="Client Name">
            </div>
            <div class="form-group">
              <label>Client Address</label>
              <textarea id="clientAddress" rows="2" placeholder="Client address"></textarea>
            </div>
            <div class="form-group">
              <label>Client Email</label>
              <input type="email" id="clientEmail" placeholder="client@email.com">
            </div>
            <button class="btn" onclick="saveClient()">💾 Save Client</button>
          </div>

          <!-- Invoice Details -->
          <div class="section">
            <h3>📄 Invoice Details</h3>
            <div class="form-row">
              <div class="form-group">
                <label>Invoice Number</label>
                <input type="text" id="invoiceNumber">
              </div>
              <div class="form-group">
                <label>Status</label>
                <select id="invoiceStatus">
                  <option value="draft">Draft</option>
                  <option value="sent">Sent</option>
                  <option value="paid">Paid</option>
                  <option value="overdue">Overdue</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Issue Date</label>
                <input type="date" id="issueDate">
              </div>
              <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="dueDate">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Currency</label>
                <select id="currency">
                  <option value="GBP">GBP (£)</option>
                  <option value="USD">USD ($)</option>
                  <option value="EUR">EUR (€)</option>
                </select>
              </div>
              <div class="form-group">
                <label>Payment Terms</label>
                <input type="text" id="paymentTerms" placeholder="e.g., Net 30">
              </div>
            </div>
          </div>

          <!-- Line Items -->
          <div class="section">
            <h3>📝 Line Items</h3>
            <div class="line-items" id="lineItems"></div>
            <button class="btn btn-primary" onclick="addLineItem()">+ Add Item</button>
          </div>

          <!-- Notes -->
          <div class="section">
            <h3>📋 Notes</h3>
            <div class="form-group">
              <textarea id="notes" rows="3" placeholder="Any additional notes or terms"></textarea>
            </div>
          </div>

          <!-- Saved Invoices -->
          <div class="section">
            <h3>📁 Saved Invoices</h3>
            <button class="btn" onclick="toggleSavedInvoices()">View Saved</button>
            <div id="savedInvoicesList" style="display: none; margin-top: 15px;"></div>
          </div>
        </div>

        <!-- Preview Panel -->
        <div class="preview-panel">
          <div class="preview-invoice" id="invoicePreview"></div>
          <div class="download-actions">
            <button class="btn good" onclick="downloadPDF()">📥 Download PDF</button>
            <button class="btn btn-primary" onclick="saveInvoice()">💾 Save Invoice</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="brand-footer"></div>
</div>

<script>
(async () => {
  try {
    const f = await fetch('../branding/footer.html').then(r => r.text());
    document.getElementById('brand-footer').innerHTML = f;
  } catch (e) {
    console.warn('Branding footer include failed:', e);
  }
})();
</script>

<script>
let invoiceData = {
  company: {},
  client: {},
  invoice: {},
  items: [],
  logo: null
};

let clients = JSON.parse(localStorage.getItem('invoiceClients') || '[]');
let profile = JSON.parse(localStorage.getItem('invoiceProfile') || '{}');

document.addEventListener('DOMContentLoaded', function() {
  loadProfile();
  generateInvoiceNumber();
  setDefaultDates();
  addLineItem();
  updatePreview();

  ['companyName', 'companyAddress', 'companyPhone', 'companyEmail', 'bankDetails',
   'clientName', 'clientAddress', 'clientEmail',
   'invoiceNumber', 'issueDate', 'dueDate', 'invoiceStatus', 'paymentTerms', 'currency', 'notes'
  ].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener('input', updatePreview);
      el.addEventListener('change', updatePreview);
    }
  });

  document.getElementById('logoInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      if (!file.type.startsWith('image/')) {
        alert('Please select an image file.');
        return;
      }
      if (file.size > 2 * 1024 * 1024) {
        alert('Please select an image smaller than 2MB.');
        return;
      }
      const reader = new FileReader();
      reader.onload = function(event) {
        invoiceData.logo = event.target.result;
        document.getElementById('logoPreview').innerHTML = 
          `<img src="${invoiceData.logo}" alt="Logo" class="logo-preview">
           <p class="hint">Logo uploaded</p>`;
        updatePreview();
      };
      reader.readAsDataURL(file);
    }
  });
});

function loadProfile() {
  if (profile.company) {
    document.getElementById('companyName').value = profile.company.name || '';
    document.getElementById('companyAddress').value = profile.company.address || '';
    document.getElementById('companyEmail').value = profile.company.email || '';
    document.getElementById('companyPhone').value = profile.company.phone || '';
    document.getElementById('bankDetails').value = profile.company.bankDetails || '';
  }
  if (profile.currency) document.getElementById('currency').value = profile.currency;
  if (profile.paymentTerms) document.getElementById('paymentTerms').value = profile.paymentTerms;
  if (profile.logo) {
    invoiceData.logo = profile.logo;
    document.getElementById('logoPreview').innerHTML = 
      `<img src="${profile.logo}" alt="Logo" class="logo-preview">`;
  }
}

function saveProfile() {
  const companyData = {
    name: document.getElementById('companyName').value,
    address: document.getElementById('companyAddress').value,
    email: document.getElementById('companyEmail').value,
    phone: document.getElementById('companyPhone').value,
    bankDetails: document.getElementById('bankDetails').value
  };
  
  if (!companyData.name) {
    alert('Please enter a company name.');
    return;
  }

  profile = {
    company: companyData,
    currency: document.getElementById('currency').value,
    paymentTerms: document.getElementById('paymentTerms').value,
    logo: invoiceData.logo
  };
  
  localStorage.setItem('invoiceProfile', JSON.stringify(profile));
  alert('Profile saved!');
  updatePreview();
}

function saveClient() {
  const clientName = document.getElementById('clientName').value;
  if (!clientName) {
    alert('Please enter a client name.');
    return;
  }
  
  const client = {
    name: clientName,
    address: document.getElementById('clientAddress').value,
    email: document.getElementById('clientEmail').value,
    id: Date.now()
  };
  
  clients.push(client);
  localStorage.setItem('invoiceClients', JSON.stringify(clients));
  alert(`Client "${clientName}" saved!`);
}

function searchClients() {
  const search = document.getElementById('clientSearch').value.toLowerCase();
  const clientList = document.getElementById('clientList');
  
  if (search.length < 2) {
    clientList.style.display = 'none';
    return;
  }
  
  const filtered = clients.filter(c => 
    c.name.toLowerCase().includes(search) || c.email.toLowerCase().includes(search)
  );
  
  if (filtered.length > 0) {
    clientList.innerHTML = filtered.map(c => 
      `<div class="client-item" onclick="selectClient(${c.id})">${c.name} - ${c.email}</div>`
    ).join('');
    clientList.style.display = 'block';
  } else {
    clientList.style.display = 'none';
  }
}

function selectClient(clientId) {
  const client = clients.find(c => c.id === clientId);
  if (client) {
    document.getElementById('clientName').value = client.name;
    document.getElementById('clientAddress').value = client.address;
    document.getElementById('clientEmail').value = client.email;
    document.getElementById('clientSearch').value = client.name;
    document.getElementById('clientList').style.display = 'none';
    updatePreview();
  }
}

function generateInvoiceNumber() {
  const lastNum = localStorage.getItem('lastInvoiceNumber') || 0;
  const newNum = parseInt(lastNum) + 1;
  document.getElementById('invoiceNumber').value = `INV-${String(newNum).padStart(4, '0')}`;
}

function setDefaultDates() {
  const today = new Date();
  const due = new Date(today);
  due.setDate(today.getDate() + 30);
  
  document.getElementById('issueDate').value = today.toISOString().split('T')[0];
  document.getElementById('dueDate').value = due.toISOString().split('T')[0];
}

function addLineItem() {
  const lineItems = document.getElementById('lineItems');
  const lineItem = document.createElement('div');
  lineItem.className = 'line-item';
  lineItem.innerHTML = `
    <div class="form-group">
      <label>Description</label>
      <input type="text" placeholder="Description" oninput="updatePreview()">
    </div>
    <div class="form-group">
      <label>Qty</label>
      <input type="number" placeholder="1" value="1" min="0" step="0.01" oninput="updatePreview()">
    </div>
    <div class="form-group">
      <label>Price</label>
      <input type="number" placeholder="0.00" min="0" step="0.01" oninput="updatePreview()">
    </div>
    <div class="form-group">
      <label>VAT %</label>
      <input type="number" placeholder="0" min="0" max="100" value="0" oninput="updatePreview()">
    </div>
    <div class="form-group">
      <label>Disc %</label>
      <input type="number" placeholder="0" min="0" max="100" value="0" oninput="updatePreview()">
    </div>
    <div class="form-group">
      <button class="btn btn-secondary" onclick="this.closest('.line-item').remove(); updatePreview();" style="padding: 8px 12px; margin-top: 20px;">×</button>
    </div>
  `;
  lineItems.appendChild(lineItem);
  updatePreview();
}

function getCurrencySymbol(currency) {
  const symbols = { USD: '$', EUR: '€', GBP: '£', CAD: '$' };
  return symbols[currency] || currency;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function updatePreview() {
  const data = {
    company: {
      name: document.getElementById('companyName').value,
      address: document.getElementById('companyAddress').value,
      email: document.getElementById('companyEmail').value,
      phone: document.getElementById('companyPhone').value,
      bankDetails: document.getElementById('bankDetails').value
    },
    client: {
      name: document.getElementById('clientName').value,
      address: document.getElementById('clientAddress').value,
      email: document.getElementById('clientEmail').value
    },
    invoice: {
      number: document.getElementById('invoiceNumber').value,
      issueDate: document.getElementById('issueDate').value,
      dueDate: document.getElementById('dueDate').value,
      currency: document.getElementById('currency').value,
      paymentTerms: document.getElementById('paymentTerms').value,
      status: document.getElementById('invoiceStatus').value,
      notes: document.getElementById('notes').value
    },
    items: []
  };

  document.querySelectorAll('.line-item').forEach(item => {
    const inputs = item.querySelectorAll('input');
    if (inputs[0].value || inputs[2].value) {
      data.items.push({
        description: inputs[0].value,
        quantity: parseFloat(inputs[1].value) || 0,
        unitPrice: parseFloat(inputs[2].value) || 0,
        vatRate: parseFloat(inputs[3].value) || 0,
        discount: parseFloat(inputs[4].value) || 0
      });
    }
  });

  let subtotal = 0, totalVAT = 0, totalDiscount = 0;
  data.items.forEach(item => {
    const lineTotal = item.quantity * item.unitPrice;
    const discountAmount = lineTotal * (item.discount / 100);
    const lineSubtotal = lineTotal - discountAmount;
    const vatAmount = lineSubtotal * (item.vatRate / 100);
    subtotal += lineSubtotal;
    totalVAT += vatAmount;
    totalDiscount += discountAmount;
  });
  const grandTotal = subtotal + totalVAT;

  const curr = getCurrencySymbol(data.invoice.currency);
  const statusClass = `status-${data.invoice.status}`;
  
  document.getElementById('invoicePreview').innerHTML = `
    <div class="invoice-header">
      <div class="company-info">
        ${invoiceData.logo ? `<img src="${invoiceData.logo}" alt="Logo" style="max-width: 120px; max-height: 60px; margin-bottom: 16px;">` : ''}
        <div style="font-weight: 600; font-size: 16px;">${data.company.name || 'Company Name'}</div>
        <div style="white-space: pre-line; margin-top: 8px; font-size: 12px;">${data.company.address}</div>
        <div style="font-size: 12px;">${data.company.email}</div>
        ${data.company.phone ? `<div style="font-size: 12px;">${data.company.phone}</div>` : ''}
      </div>
      <div>
        <div class="invoice-title">INVOICE</div>
        <div class="invoice-meta">
          <div><strong>Invoice #:</strong> ${data.invoice.number}</div>
          <div><strong>Issue Date:</strong> ${formatDate(data.invoice.issueDate)}</div>
          <div><strong>Due Date:</strong> ${formatDate(data.invoice.dueDate)}</div>
          <div style="margin-top: 8px;">
            <span class="status-badge ${statusClass}">${data.invoice.status}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="billing-section">
      <div>
        <h4 style="margin-bottom: 8px; font-size: 13px;">Bill To:</h4>
        <div style="font-weight: 600;">${data.client.name || 'Client Name'}</div>
        <div style="white-space: pre-line; font-size: 12px;">${data.client.address}</div>
        <div style="font-size: 12px;">${data.client.email}</div>
      </div>
      <div>
        <h4 style="margin-bottom: 8px; font-size: 13px;">Payment Terms:</h4>
        <div style="font-size: 12px;">${data.invoice.paymentTerms || 'Net 30'}</div>
        ${data.company.bankDetails ? `
          <h4 style="margin-bottom: 8px; margin-top: 16px; font-size: 13px;">Bank Details:</h4>
          <div style="white-space: pre-line; font-size: 12px;">${data.company.bankDetails}</div>
        ` : ''}
      </div>
    </div>

    ${data.items.length > 0 ? `
      <table class="items-table">
        <thead>
          <tr>
            <th>Description</th>
            <th style="text-align: right;">Qty</th>
            <th style="text-align: right;">Price</th>
            <th style="text-align: right;">Disc</th>
            <th style="text-align: right;">VAT</th>
            <th style="text-align: right;">Total</th>
          </tr>
        </thead>
        <tbody>
          ${data.items.map(item => {
            const lineTotal = item.quantity * item.unitPrice;
            const discountAmount = lineTotal * (item.discount / 100);
            const lineSubtotal = lineTotal - discountAmount;
            const vatAmount = lineSubtotal * (item.vatRate / 100);
            const itemTotal = lineSubtotal + vatAmount;
            return `
              <tr>
                <td>${item.description}</td>
                <td style="text-align: right;">${item.quantity}</td>
                <td style="text-align: right;">${curr}${item.unitPrice.toFixed(2)}</td>
                <td style="text-align: right;">${item.discount}%</td>
                <td style="text-align: right;">${item.vatRate}%</td>
                <td style="text-align: right;">${curr}${itemTotal.toFixed(2)}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    ` : '<p style="color: #666; font-style: italic;">No items added yet</p>'}

    <div class="totals-section">
      <div class="total-row"><span>Subtotal:</span> <span>${curr}${subtotal.toFixed(2)}</span></div>
      ${totalDiscount > 0 ? `<div class="total-row"><span>Discount:</span> <span>-${curr}${totalDiscount.toFixed(2)}</span></div>` : ''}
      <div class="total-row"><span>VAT:</span> <span>${curr}${totalVAT.toFixed(2)}</span></div>
      <div class="total-row grand-total"><span>Total:</span> <span>${curr}${grandTotal.toFixed(2)}</span></div>
    </div>

    ${data.invoice.notes ? `
      <div style="margin-top: 24px; padding-top: 16px; border-top: 1px solid #ddd;">
        <h4 style="margin-bottom: 8px; font-size: 13px;">Notes:</h4>
        <p style="font-size: 12px; white-space: pre-line;">${data.invoice.notes}</p>
      </div>
    ` : ''}
  `;
}

async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  
  const preview = document.getElementById('invoicePreview');
  const html = preview.innerHTML;
  
  // Simple text-based PDF for now
  doc.setFontSize(20);
  doc.text('INVOICE', 150, 20, { align: 'right' });
  
  doc.setFontSize(12);
  const companyName = document.getElementById('companyName').value || 'Company';
  const invoiceNum = document.getElementById('invoiceNumber').value;
  const clientName = document.getElementById('clientName').value || 'Client';
  
  doc.text(companyName, 20, 30);
  doc.text(`Invoice: ${invoiceNum}`, 150, 30, { align: 'right' });
  doc.text(`Bill To: ${clientName}`, 20, 50);
  
  let y = 70;
  doc.setFontSize(10);
  document.querySelectorAll('.line-item').forEach(item => {
    const inputs = item.querySelectorAll('input');
    if (inputs[0].value) {
      const desc = inputs[0].value;
      const qty = inputs[1].value;
      const price = inputs[2].value;
      doc.text(`${desc} - Qty: ${qty} x £${price}`, 20, y);
      y += 8;
    }
  });
  
  doc.save(`${invoiceNum || 'invoice'}.pdf`);
}

function saveInvoice() {
  const data = {
    id: Date.now(),
    number: document.getElementById('invoiceNumber').value,
    client: document.getElementById('clientName').value,
    total: calculateTotal(),
    status: document.getElementById('invoiceStatus').value,
    date: document.getElementById('issueDate').value,
    items: []
  };
  
  document.querySelectorAll('.line-item').forEach(item => {
    const inputs = item.querySelectorAll('input');
    if (inputs[0].value) {
      data.items.push({
        description: inputs[0].value,
        quantity: inputs[1].value,
        price: inputs[2].value,
        vat: inputs[3].value,
        discount: inputs[4].value
      });
    }
  });
  
  const invoices = JSON.parse(localStorage.getItem('savedInvoices') || '[]');
  invoices.push(data);
  localStorage.setItem('savedInvoices', JSON.stringify(invoices));
  localStorage.setItem('lastInvoiceNumber', parseInt(data.number.replace('INV-', '')));
  
  alert('Invoice saved!');
  generateInvoiceNumber();
}

function calculateTotal() {
  let total = 0;
  document.querySelectorAll('.line-item').forEach(item => {
    const inputs = item.querySelectorAll('input');
    const qty = parseFloat(inputs[1].value) || 0;
    const price = parseFloat(inputs[2].value) || 0;
    const vat = parseFloat(inputs[3].value) || 0;
    const discount = parseFloat(inputs[4].value) || 0;
    const lineTotal = qty * price;
    const discounted = lineTotal * (1 - discount/100);
    total += discounted * (1 + vat/100);
  });
  return total.toFixed(2);
}

function toggleSavedInvoices() {
  const list = document.getElementById('savedInvoicesList');
  if (list.style.display === 'none') {
    const invoices = JSON.parse(localStorage.getItem('savedInvoices') || '[]');
    list.innerHTML = invoices.length ? invoices.map(inv => `
      <div class="saved-invoice-item" onclick="loadInvoice(${inv.id})">
        <div class="invoice-item-header">
          <strong>${inv.number}</strong>
          <span class="status-badge status-${inv.status}">${inv.status}</span>
        </div>
        <div class="invoice-item-details">${inv.client} - £${inv.total}</div>
      </div>
    `).join('') : '<p class="hint">No saved invoices</p>';
    list.style.display = 'block';
  } else {
    list.style.display = 'none';
  }
}

function loadInvoice(id) {
  const invoices = JSON.parse(localStorage.getItem('savedInvoices') || '[]');
  const inv = invoices.find(i => i.id === id);
  if (inv) {
    document.getElementById('invoiceNumber').value = inv.number;
    document.getElementById('clientName').value = inv.client;
    document.getElementById('invoiceStatus').value = inv.status;
    document.getElementById('issueDate').value = inv.date;
    
    const lineItems = document.getElementById('lineItems');
    lineItems.innerHTML = '';
    inv.items.forEach(item => {
      addLineItem();
      const lastItem = lineItems.lastElementChild;
      const inputs = lastItem.querySelectorAll('input');
      inputs[0].value = item.description;
      inputs[1].value = item.quantity;
      inputs[2].value = item.price;
      inputs[3].value = item.vat;
      inputs[4].value = item.discount;
    });
    
    updatePreview();
  }
}
